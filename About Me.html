<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me — Cyber Profile</title>

    <!-- Cyberpunk Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL CYBERPUNK AESTHETIC --- */
        body {
            margin: 0;
            padding: 40px;
            background: radial-gradient(circle at center, #050510 0%, #000008 70%);
            color: #d0faff;
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 6px #00eaff;
            line-height: 1.6;
        }

        /* Scanline overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 3px,
                transparent 4px
            );
            z-index: 5;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            text-align: center;
            color: #00eaff;
            text-shadow: 0 0 12px #00eaff, 0 0 24px #0088aa;
            margin-bottom: 40px;
        }

        article {
            max-width: 900px;
            margin: auto;
            padding: 30px;
            background: rgba(0, 20, 40, 0.4);
            border: 2px solid #00eaff;
            border-radius: 12px;
            box-shadow: 0 0 20px #00eaff55;
        }

        p {
            margin-bottom: 20px;
            font-size: 20px;
        }

        ul {
            margin-left: 20px;
        }

        ul li {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 2px solid #00eaff;
        }

        /* Navigation */
        nav {
            text-align: center;
            margin-top: 40px;
        }

        nav a {
            font-family: 'Orbitron', sans-serif;
            color: #00eaff;
            text-decoration: none;
            font-size: 22px;
            padding: 12px 24px;
            border: 2px solid #00eaff;
            border-radius: 8px;
            transition: 0.3s;
            text-shadow: 0 0 8px #00eaff;
        }

        nav a:hover {
            background: #00eaff;
            color: #000;
            box-shadow: 0 0 20px #00eaff;
        }
    </style>
</head>

<body>

<main>
    <article>
        <h2>About Me</h2>

        <p>Hey there! My name is Nigh, the chaotic, music-loving stoner.</p>
        <p>I have many passions, things I like to do; but most recently, I've found myself doing a lot of the following:</p>

        <ul>
            <li>Listening to music</li>
            <li>Side quests</li>
            <li>Cooking</li>
            <li>Reading</li>
            <li>Gaming</li>
            <li>Scrolling through Pinterest</li>
        </ul>
    </article>
</main>

<nav class="center-text">
    <a href="My Website.html">Home Page</a>
</nav>

</body>
</html>
