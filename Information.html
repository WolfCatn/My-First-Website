<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information</title>

    <!-- Cyberpunk Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* ===== GLOBAL CYBERPUNK STYLE ===== */
        body {
            margin: 0;
            padding: 40px 20px;
            background: #020202;
            color: #0ff;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Neon glow text */
        p, a, h1, h2 {
            text-shadow: 0 0 8px #0ff, 0 0 15px #0aa;
        }

        a {
            color: #0ff;
            text-decoration: none;
            font-weight: bold;
        }

        /* ===== HOLOGRAM HEADER ===== */
        h2 {
            font-size: 38px;
            margin: 0 auto 30px;
            padding: 15px 25px;
            border: 3px solid #0ff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            display: inline-block;
            animation: neon-border 4s linear infinite, holo-flicker 3s infinite;
        }

        /* Flicker animation */
        @keyframes holo-flicker {
            0%, 100% { opacity: 1; }
            10% { opacity: 0.6; }
            12% { opacity: 1; }
            20% { opacity: 0.4; }
            22% { opacity: 1; }
            30% { opacity: 0.7; }
            32% { opacity: 1; }
            70% { opacity: 0.9; }
        }

        /* Animated neon border */
        @keyframes neon-border {
            0% { box-shadow: 0 0 10px #0ff, inset 0 0 10px #0aa; border-color: #0ff; }
            50% { box-shadow: 0 0 20px #f0f, inset 0 0 15px #a0a; border-color: #f0f; }
            100% { box-shadow: 0 0 10px #0ff, inset 0 0 10px #0aa; border-color: #0ff; }
        }

        /* Content panel */
        .info-box {
            max-width: 800px;
            margin: 0 auto 40px;
            padding: 25px;
            border: 3px solid #0ff;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.25);
            animation: neon-border 4s linear infinite;
        }

        /* Home button */
        nav a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            border: 2px solid #0ff;
            border-radius: 10px;
            background: black;
            animation: neon-border 4s linear infinite;
            transition: 0.2s;
        }

        nav a:hover {
            transform: scale(1.05);
        }

        /* ===== FLOATING NEON PARTICLES ===== */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #0ff;
            box-shadow: 0 0 8px #0ff;
            border-radius: 50%;
            animation: drift 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(120vh); }
        }

        /* ===== SCANLINE OVERLAY ===== */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            z-index: 999;
        }
    </style>
</head>

<body>

    <!-- Floating particles -->
    <div class="particles"></div>
    <script>
        for (let i = 0; i < 60; i++) {
            const p = document.createElement("div");
            p.classList.add("particle");
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = 4 + Math.random() * 6 + "s";
            p.style.opacity = 0.3 + Math.random() * 0.7;
            document.querySelector(".particles").appendChild(p);
        }
    </script>

    <!-- Scanline overlay -->
    <div class="scanlines"></div>

    <main>
        <h2>Information Page</h2>

        <div class="info-box">
            <p>
                This website was originally created during my senior year in high school for a web design class.
                Since then, I’ve kept upgrading it — adding new pages, new styles, and new ideas just for fun.
                Hopefully you find something here that sparks your curiosity.
            </p>
        </div>

        <nav>
            <a href="My Website.html">Home Page</a>
        </nav>
    </main>

</body>
</html>
